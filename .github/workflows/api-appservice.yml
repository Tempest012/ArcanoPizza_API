name: api-appservice

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve project path
        shell: bash
        run: |
          set -euo pipefail
          if [[ -f "ArcanoPizza_API/ArcanoPizza_API.csproj" ]]; then
            echo "PROJECT_PATH=ArcanoPizza_API/ArcanoPizza_API.csproj" >> "$GITHUB_ENV"
          elif [[ -f "ArcanoPizza_API/ArcanoPizza_API/ArcanoPizza_API.csproj" ]]; then
            echo "PROJECT_PATH=ArcanoPizza_API/ArcanoPizza_API/ArcanoPizza_API.csproj" >> "$GITHUB_ENV"
          elif [[ -f "ArcanoPizza_API.csproj" ]]; then
            echo "PROJECT_PATH=ArcanoPizza_API.csproj" >> "$GITHUB_ENV"
          else
            echo "No se encontró ArcanoPizza_API.csproj en rutas conocidas." >&2
            ls -la
            exit 1
          fi
          echo "Usando PROJECT_PATH=$PROJECT_PATH"

      - name: Restore
        run: dotnet restore "${{ env.PROJECT_PATH }}"

      - name: Build
        run: dotnet build "${{ env.PROJECT_PATH }}" -c Release --no-restore

      - name: Publish
        run: dotnet publish "${{ env.PROJECT_PATH }}" -c Release -o "${{ github.workspace }}/publish" --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: publish

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Evita intentar desplegar en PRs (secrets no disponibles).
    if: github.event_name == 'push'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: publish

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: publish

